name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Mirrors ci.yml so a tag can't be released unless it builds/vets against the
  # 1.18 floor and passes tests. Tags aren't guaranteed to point at a commit
  # that already went through CI, so re-verify here before publishing.
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.18", "stable"]
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Run tests
        run: go test ./...

  goreleaser:
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
